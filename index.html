<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/froala-editor@latest/css/froala_editor.pkgd.min.css" rel="stylesheet"
        type="text/css" />

</head>

<body>
    <form action="/submit" method="POST">
        <h3>Cadastre-se </h3>
        <div class="form-group">
            <label for="nome">Nome: </label>
            <input type="text" id="nome" name="nome" placeholder="Nome completo...">
        </div>
        <div class="form-group">
            <label for="data_nascimento">Data de Nascimento: </label>
            <input id="data_nascimento" name="data_nascimento" type="date">
        </div>
        <div class="form-group">
            <label for="email">Email: </label>
            <input type="email" id="email" name="email">
        </div>
        <div class="form-group">
            <label for="senha">Senha:</label>
            <input type="password" name="senha" id="senha">
        </div>
        <div class="form-group">
            <label>Habilidades: </label>
            <label for="html">
                <input type="checkbox" id="html" name="habilidades" value="HTML">HTML
            </label>
            <label for="css">
                <input type="checkbox" id="css" name="habilidades" value="CSS">CSS
            </label>
            <label for="js">
                <input type="checkbox" id="js" name="habilidades" value="JS">JavaScript
            </label>
        </div>
        <div class="form-group">
            
        </div>
        <div class="form-group">
            <label for="pais">País: </label>
            <select id="pais" name="pais">
                <option value="br">Brasil</option>
                <option value="pt">Portugal</option>
                <option value="py">Paraguai</option>
                <option value="ar">Argentina</option>
                <option value="ao">Angola</option>
            </select>
        </div>
        <div class="form-group">
            <label for="comentarios">Comentários: </label><br>
            <textarea id="comentarios" name="comentarios"> </textarea>
        </div>
        <script type="text/javascript"
            src="https://cdn.jsdelivr.net/npm/froala-editor@latest/js/froala_editor.pkgd.min.js"></script>
             <script>
                new FroalaEditor("#comentarios");
        </script>
        <div class="form-group-submit">
            <button type="submit"> Enviar </button>
        </div>
    </form>

</body>

</html>
